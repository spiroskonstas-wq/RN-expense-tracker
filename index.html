<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Multi-Currency Expense Tracker (CAD)</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{font-family:Arial;padding:20px;max-width:1000px;margin:auto;}
.header{display:flex;align-items:center;gap:20px;margin-bottom:25px;flex-wrap:wrap;}
.header img{max-width:150px;border-radius:8px;box-shadow:0 4px 10px rgba(0,0,0,0.2);}
table{border-collapse:collapse;width:100%;margin-top:20px;}
th,td{border:1px solid #ccc;padding:8px;text-align:left;}
th{background:#f4f4f4;}
input,select,button{padding:8px;margin-bottom:10px;width:100%;box-sizing:border-box;}
input[type=datetime-local]{font-size:0.85em;}
button{cursor:pointer;}
.totals{font-weight:bold;font-size:18px;margin-top:15px;}
.receipt-preview{width:60px;cursor:pointer;}
.button-container{display:flex;flex-wrap:wrap;gap:10px;}
.delete-btn{background:#c62828;color:white;border:none;padding:6px 10px;border-radius:4px;}
#receiptModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center;z-index:1000;}
#receiptModal img{max-width:90%;max-height:90%;}
.section{border:1px solid #ccc;padding:10px;margin-bottom:15px;border-radius:6px;background:#fafafa;}
.section h3{margin-top:0;}
.stack{display:flex;flex-direction:column;gap:5px;}
@media (max-width:700px){
table,thead,tbody,th,td,tr{display:block;width:100%;}
thead{display:none;}
tr{border:1px solid #ccc;margin-bottom:10px;padding:10px;border-radius:6px;background:#fafafa;}
td{border:none;padding:6px 0;}
td::before{font-weight:bold;display:block;}
td:nth-child(1)::before{content:"Trip #";}
td:nth-child(2)::before{content:"Expense Date";}
td:nth-child(3)::before{content:"Description";}
td:nth-child(4)::before{content:"Amount";}
td:nth-child(5)::before{content:"Currency";}
td:nth-child(6)::before{content:"Base Rate";}
td:nth-child(7)::before{content:"Rate with Markup";}
td:nth-child(8)::before{content:"Amount CAD";}
td:nth-child(9)::before{content:"Receipt";}
td:nth-child(10)::before{content:"Action";}
}
</style>
</head>
<body>

<div class="header">
<img src="https://www.flyingtigerssurplus.com/product-images/xxlg/P7775.jpg">
<h2>Multi-Currency Expense Tracker (CAD)</h2>
</div>

<div class="section">
<h3>Client Information</h3>
<input type="text" id="clientName" placeholder="Enter client name">
</div>

<div class="section">
<h3>Trip Information</h3>
<div class="stack">
<input type="text" id="trip" placeholder="Trip Number">
<label>Trip Start Date & Time</label>
<input type="datetime-local" id="tripStartDateTime" onchange="calculateDays()">
<label>Trip End Date & Time</label>
<input type="datetime-local" id="tripEndDateTime" onchange="calculateDays()">
<label>Calculated Days</label>
<input type="number" id="numDaysDisplay" readonly>
</div>
</div>

<div class="section">
<h3>Expense Information</h3>
<input type="date" id="date" placeholder="Enter date">
<input type="text" id="desc" placeholder="Description">
<input type="number" id="amount" placeholder="Amount" step="0.01">
<select id="currency">
<option value="CAD">CAD</option>
<option value="USD">USD</option>
<option value="EUR">EUR</option>
<option value="GBP">GBP</option>
<option value="MXN">MXN</option>
<option value="CZK">CZK</option>
<option value="JPY">JPY</option>
<option value="AUD">AUD</option>
<option value="CHF">CHF</option>
<option value="INR">INR</option>
<option value="COP">COP</option>
<option value="DOP">DOP</option>
</select>
<input type="file" id="receipt" accept="image/*">
</div>

<div class="button-container">
<button onclick="addExpense()">Add Expense</button>
<button onclick="exportToPDF()">Export to PDF</button>
<input type="number" id="days" placeholder="Number of Days" min="0" oninput="updateDaysTotal()">
</div>

<table>
<thead>
<tr>
<th>Trip #</th>
<th>Expense Date</th>
<th>Description</th>
<th>Amount</th>
<th>Currency</th>
<th>Base Rate</th>
<th>Rate with Markup</th>
<th>Amount CAD</th>
<th>Receipt</th>
<th>Action</th>
</tr>
</thead>
<tbody id="expenseTable"></tbody>
</table>

<div class="totals" id="totalExpenses">Total Expenses in CAD: $0.00</div>
<div class="totals" id="daysTotal">Days Total (800 CAD/day): $0.00</div>
<div class="totals" id="grandTotal">Grand Total in CAD: $0.00</div>

<div id="receiptModal" onclick="closeReceipt()">
<img id="receiptFull">
</div>

<script>
const FX_MARKUP=1.035;
let totalCAD=0,totalDaysCAD=0;
let expenses=[],expenseImages=[];
let currentTripNumber=sessionStorage.getItem("currentTripNumber")||"";

function resizeImageForPDF(file,maxSize=1000){
    return new Promise(resolve=>{
        const reader=new FileReader();
        reader.onload=e=>{
            const img=new Image();
            img.onload=()=>{
                let w=img.width,h=img.height;
                const scale=Math.min(maxSize/w,maxSize/h,1);
                w*=scale; h*=scale;
                const canvas=document.createElement("canvas");
                canvas.width=w; canvas.height=h;
                const ctx=canvas.getContext("2d");
                ctx.drawImage(img,0,0,w,h);
                resolve(canvas.toDataURL("image/jpeg",0.8));
            };
            img.src=e.target.result;
        };
        reader.readAsDataURL(file);
    });
}

function calculateDays(){
    const startInput=document.getElementById("tripStartDateTime").value;
    const endInput=document.getElementById("tripEndDateTime").value;
    if(!startInput||!endInput) return;
    const startDate=new Date(startInput);
    const endDate=new Date(endInput);
    const diffMs=endDate.getTime()-startDate.getTime();
    let days=Math.floor(diffMs/(1000*60*60*24))+1;
    document.getElementById("numDaysDisplay").value=days;
    totalDaysCAD=days*800;
    document.getElementById("daysTotal").innerText="Days Total ("+days+" days): $"+totalDaysCAD.toFixed(2);
    updateGrandTotal();
}

function updateGrandTotal(){
    document.getElementById("grandTotal").innerText="Grand Total in CAD: $"+(totalCAD+totalDaysCAD).toFixed(2);
}

async function getRate(currency,date){
    if(currency==="CAD") return 1;
    const formattedDate=date?new Date(date).toISOString().split("T")[0]:"";
    try{
        if(formattedDate){
            const histRes = await fetch(`https://api.exchangerate.host/${formattedDate}?base=${currency}&symbols=CAD`);
            const histData = await histRes.json();
            if(histData && histData.rates && histData.rates.CAD) return histData.rates.CAD;
        }
    }catch(e){}
    try{
        const fallbackRes=await fetch("https://open.er-api.com/v6/latest/"+currency);
        const fallbackData = await fallbackRes.json();
        if(fallbackData && fallbackData.rates && fallbackData.rates.CAD) return fallbackData.rates.CAD;
    }catch(e){}
    alert(`Rate unavailable for ${currency}. Using 1 as fallback.`);
    return 1;
}

function saveExpenses(){
    sessionStorage.setItem("expenses",JSON.stringify(expenses));
    sessionStorage.setItem("expenseImages",JSON.stringify(expenseImages));
    sessionStorage.setItem("currentTripNumber",currentTripNumber);
}

function loadExpenses(){
    const saved = sessionStorage.getItem("expenses");
    const savedImages = sessionStorage.getItem("expenseImages");
    if(saved){
        expenses=JSON.parse(saved);
        expenseImages=savedImages?JSON.parse(savedImages):[];
        totalCAD=0;
        expenses.forEach((exp,i)=>{ addRow(i); totalCAD+=exp.amountCAD; });
        document.getElementById("totalExpenses").innerText="Total Expenses in CAD: $"+totalCAD.toFixed(2);
        updateGrandTotal();
    }
}

window.onload=()=>{
    loadExpenses();
    document.getElementById("trip").value=currentTripNumber;
};
document.getElementById("trip").addEventListener("input",e=>{currentTripNumber=e.target.value.trim(); sessionStorage.setItem("currentTripNumber",currentTripNumber);});

async function addExpense(){
    const trip=document.getElementById("trip").value.trim()||currentTripNumber;
    const date=document.getElementById("date").value;
    const desc=document.getElementById("desc").value.trim();
    const amount=parseFloat(document.getElementById("amount").value);
    const currency=document.getElementById("currency").value;
    const receiptFile=document.getElementById("receipt").files[0];
    const tripStart=document.getElementById("tripStartDateTime").value;
    const tripEnd=document.getElementById("tripEndDateTime").value;

    if(!trip||!desc||!date||isNaN(amount)){alert("Please fill all fields."); return;}
    currentTripNumber=trip; sessionStorage.setItem("currentTripNumber",currentTripNumber);
    const baseRate=await getRate(currency,date);
    const rateWithMarkup=baseRate*FX_MARKUP;
    const amountCAD=amount*rateWithMarkup;
    let receiptData=null; if(receiptFile) receiptData=await resizeImageForPDF(receiptFile);

    expenses.push({trip,date,desc,amount,currency,baseRate,rateWithMarkup,amountCAD,tripStart,tripEnd});
    expenseImages.push(receiptData);
    addRow(expenses.length-1);
    totalCAD+=amountCAD;
    document.getElementById("totalExpenses").innerText="Total Expenses in CAD: $"+totalCAD.toFixed(2);
    updateGrandTotal();
    saveExpenses();
    document.getElementById("desc").value=""; document.getElementById("amount").value=""; document.getElementById("receipt").value="";
}

function addRow(i){
    const preview=expenseImages[i]? `<img src="${expenseImages[i]}" class="receipt-preview" onclick="viewReceipt(${i})">`:"";
    const tbody=document.getElementById("expenseTable");
    const row=document.createElement("tr");
    row.innerHTML=`
        <td>${expenses[i].trip}</td>
        <td>${expenses[i].date}</td>
        <td>${expenses[i].desc}</td>
        <td>${expenses[i].amount.toFixed(2)}</td>
        <td>${expenses[i].currency}</td>
        <td>${expenses[i].baseRate.toFixed(4)}</td>
        <td>${expenses[i].rateWithMarkup.toFixed(4)}</td>
        <td>${expenses[i].amountCAD.toFixed(2)}</td>
        <td>${preview}</td>
        <td><button class="delete-btn" onclick="deleteExpense(${i})">Delete</button></td>
    `;
    tbody.appendChild(row);
}

function deleteExpense(i){
    totalCAD-=expenses[i].amountCAD;
    expenses.splice(i,1); expenseImages.splice(i,1);
    saveExpenses(); renderTable();
}
function renderTable(){
    const tbody=document.getElementById("expenseTable"); tbody.innerHTML="";
    totalCAD=0; expenses.forEach((exp,i)=>{addRow(i); totalCAD+=exp.amountCAD;});
    document.getElementById("totalExpenses").innerText="Total Expenses in CAD: $"+totalCAD.toFixed(2);
    updateGrandTotal();
}

function viewReceipt(index){document.getElementById("receiptFull").src=expenseImages[index]; document.getElementById("receiptModal").style.display="flex";}
function closeReceipt(){document.getElementById("receiptModal").style.display="none";}

function updateDaysTotal(){
    const days=parseFloat(document.getElementById("days").value)||0;
    totalDaysCAD=days*800;
    document.getElementById("daysTotal").innerText="Days Total ("+days+" days): $"+totalDaysCAD.toFixed(2);
    updateGrandTotal();
}

async function exportToPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    let y = 10;

    doc.setFontSize(16);
    doc.text("Expense Report", 10, y); y += 10;

    const client = document.getElementById("clientName").value;
    const trip = document.getElementById("trip").value;
    const tripStart = document.getElementById("tripStartDateTime").value;
    const tripEnd = document.getElementById("tripEndDateTime").value;
    const daysCount = parseInt(document.getElementById("numDaysDisplay").value) || 0;

    doc.setFontSize(12);
    doc.text("Client: " + client, 10, y); y += 6;
    doc.text("Trip #: " + trip, 10, y); y += 6;

    if(tripStart) { doc.text("Trip Start: " + tripStart.replace("T", " "), 10, y); y += 6; }
    if(tripEnd)   { doc.text("Trip End: " + tripEnd.replace("T", " "), 10, y); y += 10; }

    for(let i=0; i<expenses.length; i++){
        const exp = expenses[i];
        doc.text("Expense Date: " + exp.date, 10, y); y += 6;
        doc.text("Description: " + exp.desc, 10, y); y += 6;
        doc.text("Amount: " + exp.amount.toFixed(2) + " " + exp.currency, 10, y); y += 6;
        doc.text("Base Rate: " + exp.baseRate.toFixed(4), 10, y); y += 6;
        doc.text("Rate w/ Markup: " + exp.rateWithMarkup.toFixed(4), 10, y); y += 6;
        doc.text("Amount CAD: " + exp.amountCAD.toFixed(2), 10, y); y += 10;
        if(y > 250){ doc.addPage(); y = 10; }
    }

    doc.text("Total Expenses CAD: " + totalCAD.toFixed(2), 10, y); y += 6;
    doc.text("Days Total ("+daysCount+" days): " + totalDaysCAD.toFixed(2), 10, y); y += 6;
    doc.text("Grand Total CAD: " + (totalCAD + totalDaysCAD).toFixed(2), 10, y); y += 10;

    for(let i=0;i<expenseImages.length;i++){
        const imgData = expenseImages[i]; if(!imgData) continue;
        const img = new Image(); img.src = imgData; await new Promise(r=>img.onload=r);
        const pageWidth = doc.internal.pageSize.getWidth() - 20;
        const pageHeight = doc.internal.pageSize.getHeight() - 30;
        let w = img.width, h = img.height;
        const scale = Math.min(pageWidth / w, pageHeight / h, 1);
        w *= scale; h *= scale;
        const x = (doc.internal.pageSize.getWidth() - w)/2;
        const yImg = (doc.internal.pageSize.getHeight() - h)/2;
        doc.addPage(); doc.addImage(imgData, "JPEG", x, yImg, w, h);
    }

    doc.save("Expenses_Report.pdf");
}
</script>

</body>
</html>
